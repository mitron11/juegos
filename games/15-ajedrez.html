<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Suite IA | Estrategia Pura</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #102C26;
            --claro: #F7EFCE;
            --oscuro: #1a4a40;
            --acento: #e91e63;
        }

        body {
            margin: 0;
            background: var(--fondo);
            color: var(--claro);
            font-family: 'Bungee', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: #081613;
            border: 4px solid var(--claro);
            box-shadow: 10px 10px 0px var(--acento);
        }

        #chess-board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            border: 2px solid var(--claro);
        }

        .square {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            cursor: pointer;
        }

        .white { background-color: var(--claro); color: var(--fondo); }
        .black { background-color: var(--oscuro); color: var(--claro); }
        .selected { background-color: #ffeb3b !important; }
        .valid-move { position: relative; }
        .valid-move::after {
            content: '';
            width: 12px;
            height: 12px;
            background: rgba(233, 30, 99, 0.5);
            border-radius: 50%;
            position: absolute;
        }

        .status { font-size: 1.2rem; color: var(--acento); }
        button {
            font-family: 'Bungee';
            background: var(--acento);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
        }

        .back-link { margin-top: 20px; color: var(--claro); text-decoration: none; border-bottom: 2px solid var(--acento); }
    </style>
</head>
<body>

    <h1>CHESS SUITE IA</h1>
    
    <div class="game-wrap">
        <div class="status" id="status">TU TURNO (BLANCAS)</div>
        <div id="chess-board"></div>
        <button onclick="resetGame()">REINICIAR PARTIDA</button>
    </div>

    <a href="../index.html" class="back-link">VOLVER AL MENÚ</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script>
        const boardEl = document.getElementById('chess-board');
        const statusEl = document.getElementById('status');
        let game = new Chess();
        let selectedSquare = null;

        const PIECES = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
        };

        function render() {
            boardEl.innerHTML = '';
            const board = game.board();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    const squareName = String.fromCharCode(97 + c) + (8 - r);
                    const piece = board[r][c];

                    square.classList.add('square');
                    square.classList.add((r + c) % 2 === 0 ? 'white' : 'black');
                    
                    if (piece) {
                        square.innerText = PIECES[piece.type === 'p' ? (piece.color === 'w' ? 'P' : 'p') : (piece.color === 'w' ? piece.type.toUpperCase() : piece.type)];
                        if (piece.color === 'b') square.style.color = 'var(--acento)';
                    }

                    if (selectedSquare === squareName) square.classList.add('selected');

                    // Marcar movimientos legales si hay una pieza seleccionada
                    if (selectedSquare) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        if (moves.some(m => m.to === squareName)) square.classList.add('valid-move');
                    }

                    square.onclick = () => onSquareClick(squareName);
                    boardEl.appendChild(square);
                }
            }
            updateStatus();
        }

        function onSquareClick(square) {
            if (game.game_over() || game.turn() === 'b') return;

            if (selectedSquare === square) {
                selectedSquare = null;
            } else {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    selectedSquare = null;
                    render();
                    setTimeout(makeBestMove, 500); // IA mueve después
                } else {
                    const piece = game.get(square);
                    if (piece && piece.color === 'w') selectedSquare = square;
                }
            }
            render();
        }

        function makeBestMove() {
            if (game.game_over()) return;
            const moves = game.moves();
            const move = moves[Math.floor(Math.random() * moves.length)]; // IA Simple (Aleatoria por ahora)
            game.move(move);
            render();
        }

        function updateStatus() {
            let status = 'TU TURNO';
            if (game.in_checkmate()) status = '¡JAQUE MATE! FIN.';
            else if (game.in_draw()) status = 'TABLAS.';
            else if (game.in_check()) status = '¡JAQUE!';
            else if (game.turn() === 'b') status = 'IA PENSANDO...';
            statusEl.innerText = status;
        }

        function resetGame() {
            game = new Chess();
            selectedSquare = null;
            render();
        }

        render();
    </script>
</body>
</html>
